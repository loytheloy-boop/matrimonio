<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Riservata</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<div class="hero">
    <img src="img/sposi.jpg" class="foto-sposi" alt="Foto degli sposi">
    <h1>Matrimonio di Alessandro e Deborah</h1>

    <h3 id="hero-data"></h3>
    <h4 id="hero-ricevimento" class="hero-sub"></h4>
</div>

<h2 class="titolo-sezione">Area Riservata</h2>

<div id="login" class="login-box">
    <input type="password" id="pwd" placeholder="Password">
    <button onclick="login()">Accedi</button>
</div>

<div id="admin-area" style="display:none;">

    <div id="controls">
        <input type="text" id="search" placeholder="Cerca invitato..." onkeyup="filtra()">
        <button onclick="filtro('tutti')">Tutti</button>
        <button onclick="filtro('confermato')">Confermati</button>
        <button onclick="filtro('attesa')">In attesa</button>
    </div>

    <div class="table-wrapper">
        <table id="tabella"></table>
    </div>
</div>

</body>
</html>
