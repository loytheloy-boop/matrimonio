<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Riservata</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<h1>Area Riservata</h1>

<div id="login">
    <input type="password" id="pwd" placeholder="Password">
    <button onclick="login()">Accedi</button>
</div>

<div id="admin-area" style="display:none;">

    <div id="controls">
        <input type="text" id="search" placeholder="Cerca invitato..." onkeyup="filtra()">
        <button onclick="filtro('tutti')">Tutti</button>
        <button onclick="filtro('confermato')">Confermati</button>
        <button onclick="filtro('attesa')">In attesa</button>
    </div>

    <table id="tabella"></table>
</div>

</body>
</html>
