<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Riservata</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<div class="hero">
    <img src="img/sposi.jpg" class="foto-sposi">
    <h1>Matrimonio di Alessandro e Deborah</h1>

    <h3 id="hero-data"></h3>
    <h4 id="hero-ricevimento" style="margin-top:5px; font-weight:400;"></h4>
</div>

<h2 style="margin-top:20px;">Area Riservata</h2>

<div id="login">
    <input type="password" id="pwd" placeholder="Password">
    <button onclick="login()">Accedi</button>
</div>

<div id="admin-area" style="display:none;">
    <div id="controls">
        <input type="text" id="search" placeholder="Cerca invitato..." onkeyup="filtra()">
        <button onclick="filtro('tutti')">Tutti</button>
        <button onclick="filtro('confermato')">Confermati</button>
        <button onclick="filtro('attesa')">In attesa</button>
    </div>

    <table id="tabella"></table>
</div>

</body>
</html>
